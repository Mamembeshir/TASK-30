services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medvoyage_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${REVERB_PORT:-8080}:8080"
    environment:
      APP_NAME: MedVoyage
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8000}"
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-medvoyage}"
      DB_USERNAME: "${DB_USERNAME:-medvoyage}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: local
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: medvoyage
      REVERB_APP_KEY: medvoyage-key
      REVERB_APP_SECRET: medvoyage-secret
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      VITE_REVERB_APP_KEY: medvoyage-key
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/login | grep -q 'Sign in' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      # Expose the app under an additional DNS name.  The Chromium network
      # stack auto-upgrades HTTP → HTTPS for hostnames matching the `.app`
      # HSTS-preload entry (and single-label `app` matches the rule), which
      # causes every E2E page.goto to fail with ERR_CONNECTION_CLOSED because
      # the dev server only serves plain HTTP.  The alias `web` is not in any
      # HSTS preload list, so Chromium reaches the server without upgrading.
      medvoyage:
        aliases:
          - web

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: medvoyage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-medvoyage}"
      POSTGRES_USER: "${DB_USERNAME:-medvoyage}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-medvoyage} -d ${DB_DATABASE:-medvoyage}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medvoyage

  # ── Playwright E2E ──────────────────────────────────────────────────────────
  #
  # Uses the already-pulled repo-playwright:latest image (Playwright 1.59.1 +
  # Node 20).  The e2e tests are mounted from ./tests/e2e into /app/e2e so that
  # Node's module resolution can find @playwright/test in /app/node_modules.
  #
  # Run with:
  #   docker compose --profile e2e run --rm playwright
  #
  playwright:
    image: repo-playwright:latest
    container_name: medvoyage_playwright
    profiles:
      - e2e
    shm_size: '1gb'
    volumes:
      - ./tests/e2e:/app/e2e
      - playwright_cache:/root/.cache/ms-playwright
    working_dir: /app
    environment:
      BASE_URL:            "http://web:8000"
      E2E_MEMBER_EMAIL:    "member@medvoyage.test"
      E2E_MEMBER_PASSWORD: "Seed1234!@"
      E2E_ADMIN_EMAIL:     "admin@medvoyage.test"
      E2E_ADMIN_PASSWORD:  "Seed1234!@"
      PLAYWRIGHT_BROWSERS_PATH: "/root/.cache/ms-playwright"
    command: >
      sh -c "npx playwright install --with-deps chromium &&
             npx playwright test --config=/app/e2e/playwright.config.js"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - medvoyage

networks:
  medvoyage:
    driver: bridge

volumes:
  db_data:
  app_storage:
  playwright_cache:
